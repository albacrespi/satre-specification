# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    pre_build:
      #- cd docs && make satrecsv-copy
      - echo "ES Executing custom build steps..."
      - cd docs && cd es
      - make satrecsv-copy
    post_build:
      # Check satre.xlsx was correctly copied
      #- cd docs && make check-satrecsv
      - echo "ES Executing custom post build checks..."
      - cd docs && cd es
      - make check-satrecsv

sphinx:
  configuration: docs/es/conf.py #default for the projet is English language

formats:
  - epub
  - pdf

python:
  install:
    - requirements: docs/requirements.txt 
